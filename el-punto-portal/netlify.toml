[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/menu"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/club"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
